<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>document</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Verdana, sans-serif; 
            padding: 20px; 
            background: #f4f7f6; 
            color: #333; 
        }
        nav { 
            background: #2c3e50; 
            color: white; 
            padding: 15px; 
            margin-bottom: 25px; 
            border-radius: 8px; 
            display: flex; 
            gap: 20px; 
        }
        nav a { 
            color: #ecf0f1; 
            text-decoration: none; 
            font-weight: bold; 
            transition: 0.3s; 
        }
        nav a:hover { color: #3498db; }

        input { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0 20px; 
            border: 1px solid #ddd; 
            border-radius: 6px; 
            font-size: 1rem;
        }

        .book-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); 
            gap: 24px; 
        }
        .book-card { 
            background: white; 
            border: 1px solid #eee; 
            border-radius: 12px; 
            padding: 20px; 
            box-shadow: 0 3px 10px rgba(0,0,0,0.08); 
            transition: all 0.22s; 
        }
        .book-card:hover { 
            transform: translateY(-6px); 
            box-shadow: 0 8px 20px rgba(0,0,0,0.12); 
        }
        .book-card h3 { 
            margin-bottom: 10px; 
            font-size: 1.25rem; 
            line-height: 1.3; 
        }
        .book-card p { 
            color: #555; 
            margin: 6px 0; 
            font-size: 0.95rem; 
        }
        .actions { 
            margin-top: 16px; 
            display: flex; 
            gap: 10px; 
            justify-content: center; 
        }
        button { 
            padding: 8px 16px; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: 600; 
            transition: 0.2s; 
        }
        .btn-wishlist { background: #ffebee; color: #e91e63; }
        .btn-wishlist.active { background: #e91e63; color: white; }
        .btn-cart { background: #e3f2fd; color: #1976d2; }
        .btn-cart.active { background: #1976d2; color: white; }

        .modal { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background: rgba(0,0,0,0.65); 
            backdrop-filter: blur(4px); 
            z-index: 1000; 
            align-items: center; 
            justify-content: center; 
            padding: 20px; 
        }
        .modal-content { 
            background: white; 
            max-width: 540px; 
            width: 100%; 
            border-radius: 16px; 
            padding: 28px; 
            position: relative; 
            max-height: 92vh; 
            overflow-y: auto; 
        }
        .close { 
            position: absolute; 
            right: 20px; 
            top: 16px; 
            font-size: 32px; 
            cursor: pointer; 
            color: #777; 
        }
        .close:hover { color: #333; }

        .empty-msg { 
            text-align: center; 
            color: #95a5a6; 
            padding: 60px 20px; 
            font-size: 1.2rem; 
            font-style: italic; 
        }

        .badge { 
            background: #e74c3c; 
            color: white; 
            padding: 3px 9px; 
            border-radius: 12px; 
            font-size: 0.8rem; 
            margin-left: 6px; 
        }
    </style>
</head>
<body>

<nav>
    <a href="admin.html"> Адмін-панель</a>
    <a href="shop.html">🛒 Магазин</a>
    <a href="lists.html">💖 Бажання <span id="wishlist-count" class="badge">0</span></a>
    <a href="lists.html">📦 Кошик <span id="cart-count" class="badge">0</span></a>
</nav>

<div id="shop">
    <h2>Книжкова лавка</h2>
    <input type="text" id="shop-search" placeholder="Пошук за назвою, автором, жанром або роком...">

    <div id="shop-books" class="book-grid"></div>
</div>

<div id="detail-modal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeDetailModal()">×</span>
        <div id="book-detail"></div>
    </div>
</div>

<script>

class BookManager {
    constructor() {
        this.books = JSON.parse(localStorage.getItem("books")) || [];
        this.initDefaultBooks();
    }

    initDefaultBooks() {
        if (this.books.length === 0) {
            const defaults = [
                { title: "1984", author: "Джордж Орвелл", genre: "Антиутопія", date: "1949-06-08", description: "Класичний роман-антиутопія про тоталітарне суспільство, де Великий Брат стежить за кожним." },
                { title: "Гаррі Поттер і філософський камінь", author: "Дж. К. Ролінґ", genre: "Фентезі", date: "1997-06-26", description: "Перша книга про хлопчика-чарівника, який дізнається про свій дар і вступає до Гоґвортсу." },
                { title: "Майстер і Маргарита", author: "Михайло Булгаков", genre: "Магічний реалізм", date: "1967-01-01", description: "Філософський роман про диявола у Москві 30-х років, любов і боротьбу добра зі злом." },
                { title: "Маленький принц", author: "Антуан де Сент-Екзюпері", genre: "Філософська казка", date: "1943-04-06", description: "Зворушлива історія про дружбу, любов і сенс життя, розказана через дитину з іншої планети." },
                { title: "Шлях до себе", author: "Карл Густав Юнг", genre: "Психологія", date: "1961-01-01", description: "Автобіографічна праця, в якій Юнг розповідає про своє внутрішнє життя та відкриття несвідомого." },
                { title: "Дюна", author: "Френк Герберт", genre: "Наукова фантастика", date: "1965-08-01", description: "Епічна сага про боротьбу за контроль над пустельною планетою, де добувають найціннішу речовину у Всесвіті." }
            ];
            defaults.forEach(b => {
                b.id = Math.floor(Date.now() + Math.random() * 1000);
                this.books.push(b);
            });
            this.save();
        }
    }

    save() {
        localStorage.setItem("books", JSON.stringify(this.books));
    }

    getById(id) {
        return this.books.find(b => b.id === Number(id));
    }
}

class StorageManager {
    constructor(key) {
        this.key = key;
        this.items = JSON.parse(localStorage.getItem(key)) || [];
    }
    save() {
        localStorage.setItem(this.key, JSON.stringify(this.items));
    }
    toggle(id) {
        id = Number(id);
        if (this.items.includes(id)) {
            this.items = this.items.filter(i => i !== id);
        } else {
            this.items.push(id);
        }
        this.save();
    }
    has(id) {
        return this.items.includes(Number(id));
    }
}

const bookManager = new BookManager();
const wishlist = new StorageManager("wishlist");
const cart = new StorageManager("cart");



function getFilteredBooks(query = "") {
    const q = (query || "").toLowerCase().trim();
    if (!q) return [...bookManager.books];

    return bookManager.books.filter(b => 
        (b.title   || "").toLowerCase().includes(q) ||
        (b.author  || "").toLowerCase().includes(q) ||
        (b.genre   || "").toLowerCase().includes(q) ||
        (b.date    || "").toLowerCase().includes(q)
    );
}

function renderShop() {
    const query = $("#shop-search").val() || "";
    const $container = $("#shop-books").empty();
    const books = getFilteredBooks(query);

    if (books.length === 0) {
        $container.html('<p class="empty-msg">Нічого не знайдено...</p>');
        return;
    }

    books.forEach(book => {
        const inWish = wishlist.has(book.id);
        const inCart = cart.has(book.id);

        $container.append(`
            <div class="book-card">
                <div onclick="openDetailModal(${book.id})" style="cursor:pointer;">
                    <h3>${book.title || 'Без назви'}</h3>
                    <p> ${book.author || '—'}</p>
                    <p> ${book.genre || '—'}</p>
                    <p> ${book.date ? new Date(book.date).getFullYear() : '—'}</p>
                </div>
                <div class="actions">
                    <button class="btn-wishlist ${inWish ? 'active' : ''}" 
                            onclick="handleToggle('wishlist', ${book.id})">
                        ${inWish ? '❤️ У бажаннях' : '🤍 До бажань'}
                    </button>
                    <button class="btn-cart ${inCart ? 'active' : ''}" 
                            onclick="handleToggle('cart', ${book.id})">
                        ${inCart ? '✅ У кошику' : '🛒 Купити'}
                    </button>
                </div>
            </div>
        `);
    });

    updateBadges();
}

function openDetailModal(id) {
    const b = bookManager.getById(id);
    if (!b) return alert("Книгу не знайдено");

    $("#book-detail").html(`
        <h2>${b.title || 'Без назви'}</h2>
        <p><b>Автор:</b> ${b.author || '—'}</p>
        <p><b>Жанр:</b> ${b.genre || '—'}</p>
        <p><b>Дата видання:</b> ${b.date ? new Date(b.date).toLocaleDateString('uk-UA') : '—'}</p>
        <p style="margin-top:20px; line-height:1.6; white-space:pre-wrap;">
            ${b.description || 'Опис відсутній'}
        </p>
    `);
    $("#detail-modal").fadeIn(220);
}

function closeDetailModal() {
    $("#detail-modal").fadeOut(180);
}

function handleToggle(type, id) {
    if (type === 'wishlist') wishlist.toggle(id);
    else if (type === 'cart') cart.toggle(id);
    renderShop();
}

function updateBadges() {
    $("#wishlist-count").text(wishlist.items.length);
    $("#cart-count").text(cart.items.length);
}



$("#shop-search").on("input", renderShop);

window.onclick = e => {
    if ($(e.target).hasClass("modal")) closeDetailModal();
};

$(document).ready(() => {
    renderShop();
    updateBadges();
});
</script>
</body>
</html>
